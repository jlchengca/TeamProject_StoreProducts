<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REST API Product CRUD Tester</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.4;
    }

    h1 {
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 35px;
      margin-bottom: 10px;
    }

    form {
      margin-bottom: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      max-width: 500px;
      background: #fafafa;
    }

    label {
      display: block;
      margin: 8px 0 3px;
      font-weight: bold;
    }

    input, button {
      margin: 5px 0;
      padding: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      margin-top: 10px;
    }

    pre {
      background: #f4f4f4;
      padding: 10px;
      overflow: auto;
      border: 1px solid #ccc;
      border-radius: 6px;
      min-height: 80px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f0f0f0;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    .section {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <h1>REST API Product CRUD Tester</h1>

  <div class="section">
    <h2>Create Product</h2>
    <form id="createProductForm">
      <label for="createStoreId">Store ID:</label>
      <input type="text" id="createStoreId" required>

      <label for="createStoreName">Store Name:</label>
      <input type="text" id="createStoreName" required>

      <label for="createProductId">Product ID:</label>
      <input type="text" id="createProductId" required>

      <label for="createProductName">Product Name:</label>
      <input type="text" id="createProductName" required>

      <label for="createPrice">Price:</label>
      <input type="number" id="createPrice" step="0.01" required>

      <button type="submit">Create Product</button>
    </form>
  </div>

  <div class="section">
    <h2>Get All Products</h2>
    <button id="getAllProductsBtn">Fetch All Products</button>

    <table>
      <thead>
        <tr>
          <th>Source</th>
          <th>Store ID</th>
          <th>Store Name</th>
          <th>Product ID</th>
          <th>Product Name</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="productsTableBody">
        <tr>
          <td colspan="6">Click "Fetch All Products" to load data.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <h2>Get Product</h2>
    <form id="getProductForm">
      <label for="getProductId">Product ID:</label>
      <input type="text" id="getProductId" required>
      <button type="submit">Fetch Product</button>
    </form>
  </div>

  <div class="section">
    <h2>Update Product</h2>
    <form id="updateProductForm">
      <label for="updateProductId">Product ID:</label>
      <input type="text" id="updateProductId" required>

      <label for="updateStoreName">New Store Name:</label>
      <input type="text" id="updateStoreName">

      <label for="updateProductName">New Product Name:</label>
      <input type="text" id="updateProductName">

      <label for="updatePrice">New Price:</label>
      <input type="number" id="updatePrice" step="0.01">

      <button type="submit">Update Product</button>
    </form>
  </div>

  <div class="section">
    <h2>Delete Product</h2>
    <form id="deleteProductForm">
      <label for="deleteProductId">Product ID:</label>
      <input type="text" id="deleteProductId" required>
      <button type="submit">Delete Product</button>
    </form>
  </div>

  <div class="section">
    <h2>Response</h2>
    <pre id="jsonOutput">{}</pre>
  </div>

  <script>
    const output = document.getElementById('jsonOutput');
    const tableBody = document.getElementById('productsTableBody');
    const apiBase = '';

    function showJSON(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    function renderProductsTable(products) {
      if (!Array.isArray(products) || products.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="6">No products found.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = '';

      products.forEach(product => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${product.source ?? ''}</td>
          <td>${product.storeId ?? ''}</td>
          <td>${product.storeName ?? ''}</td>
          <td>${product.productId ?? ''}</td>
          <td>${product.productName ?? ''}</td>
          <td>${product.price ?? ''}</td>
        `;

        tableBody.appendChild(row);
      });
    }

    async function handleFetch(url, options = {}) {
      try {
        const res = await fetch(url, options);
        const text = await res.text();

        try {
          const data = JSON.parse(text);
          showJSON(data);
          return data;
        } catch {
          const plainData = { status: res.status, data: text };
          showJSON(plainData);
          return plainData;
        }
      } catch (err) {
        const errorData = { error: err.message };
        showJSON(errorData);
        return errorData;
      }
    }

    document.getElementById('createProductForm').addEventListener('submit', async e => {
      e.preventDefault();

      const product = {
        storeId: document.getElementById('createStoreId').value,
        storeName: document.getElementById('createStoreName').value,
        productId: document.getElementById('createProductId').value,
        productName: document.getElementById('createProductName').value,
        price: Number(document.getElementById('createPrice').value)
      };

      const data = await handleFetch(`${apiBase}/products`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(product)
      });

      if (!data.error) {
        document.getElementById('createProductForm').reset();
      }
    });

    document.getElementById('getAllProductsBtn').addEventListener('click', async () => {
      const data = await handleFetch(`${apiBase}/products`);
      if (Array.isArray(data)) {
        renderProductsTable(data);
      }
    });

    document.getElementById('getProductForm').addEventListener('submit', async e => {
      e.preventDefault();
      const productId = document.getElementById('getProductId').value.trim();
      await handleFetch(`${apiBase}/products/${productId}`);
    });

    document.getElementById('updateProductForm').addEventListener('submit', async e => {
      e.preventDefault();

      const productId = document.getElementById('updateProductId').value.trim();

      const updatedFields = {};
      const storeName = document.getElementById('updateStoreName').value.trim();
      const productName = document.getElementById('updateProductName').value.trim();
      const price = document.getElementById('updatePrice').value.trim();

      if (storeName) updatedFields.storeName = storeName;
      if (productName) updatedFields.productName = productName;
      if (price) updatedFields.price = Number(price);

      await handleFetch(`${apiBase}/products/${productId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updatedFields)
      });
    });

    document.getElementById('deleteProductForm').addEventListener('submit', async e => {
      e.preventDefault();
      const productId = document.getElementById('deleteProductId').value.trim();

      await handleFetch(`${apiBase}/products/${productId}`, {
        method: 'DELETE'
      });
    });
  </script>
</body>
</html>
